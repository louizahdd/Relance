<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relance Facture</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3EE;
    --surface: #FFFFFF;
    --border: #E2DDD6;
    --text: #1A1816;
    --muted: #8A8178;
    --accent: #C84B2F;
    --accent-light: #F5EAE7;
    --green: #2A7A4B;
    --green-light: #E6F4EC;
    --tag-bg: #EDE9E3;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  header {
    max-width: 640px;
    margin: 0 auto 28px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
  header span { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; max-width: 640px; margin: 0 auto 16px; box-shadow: var(--shadow); }
  .section-label { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 14px; }

  .quick-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; align-items: end; }
  .field-group { display: flex; flex-direction: column; gap: 5px; }
  .field-group label { font-size: 11px; color: var(--muted); font-weight: 500; }

  input[type="text"], input[type="date"], input[type="number"] {
    width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--bg);
    transition: border-color 0.2s, box-shadow 0.2s; outline: none; -webkit-appearance: none;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }

  .btn-add { background: var(--accent); color: white; border: none; border-radius: 10px; width: 42px; height: 42px; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; flex-shrink: 0; align-self: end; }
  .btn-add:active { transform: scale(0.93); }

  .invoice-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
  .invoice-item { display: flex; align-items: center; gap: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .invoice-item .num { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--accent); min-width: 80px; }
  .invoice-item .details { flex: 1; font-size: 13px; color: var(--muted); }
  .invoice-item .price { font-weight: 600; font-size: 14px; color: var(--text); white-space: nowrap; }
  .btn-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; padding: 2px 4px; border-radius: 6px; transition: color 0.2s; }
  .btn-remove:hover { color: var(--accent); }

  .client-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .options-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .opt-btn { display: flex; align-items: center; gap: 7px; padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 50px; background: var(--bg); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted); transition: all 0.15s; user-select: none; }
  .opt-btn.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 500; }

  .btn-generate { width: 100%; background: var(--accent); color: white; border: none; border-radius: 12px; padding: 15px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.1s; }
  .btn-generate:active { transform: scale(0.98); }

  .result-card { max-width: 640px; margin: 0 auto; display: none; }
  .result-card.visible { display: block; }
  .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .result-subject { background: var(--tag-bg); border-radius: 8px; padding: 8px 12px; font-size: 13px; margin-bottom: 12px; display: flex; gap: 8px; align-items: center; }
  .result-subject span:first-child { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; white-space: nowrap; }

  .mail-body { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; font-size: 14px; line-height: 1.75; color: var(--text); white-space: pre-wrap; font-family: 'DM Sans', sans-serif; min-height: 160px; }

  .btn-copy { width: 100%; background: var(--green); color: white; border: none; border-radius: 12px; padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
  .btn-copy-subject { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; font-size: 12px; cursor: pointer; color: var(--muted); font-family: 'DM Sans', sans-serif; transition: all 0.15s; }

  .btn-reset { background: none; border: 1.5px solid var(--border); border-radius: 12px; padding: 12px; width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--muted); cursor: pointer; margin-top: 8px; transition: all 0.15s; }

  .empty-state { text-align: center; padding: 20px; color: var(--muted); font-size: 13px; font-style: italic; }
  .error-msg { color: var(--accent); font-size: 12px; margin-top: 8px; display: none; }

  @media (max-width: 480px) {
    .quick-row { grid-template-columns: 1fr 1fr; }
    .btn-add { grid-column: span 2; width: 100%; height: 42px; }
    .client-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>Relance Facture</h1>
  <span>Générateur rapide</span>
</header>

<div class="card">
  <div class="section-label">Factures à relancer</div>
  <div class="quick-row">
    <div class="field-group"><label>N° Facture</label><input type="text" id="inp-num" placeholder="2024-042" /></div>
    <div class="field-group"><label>Échéance</label><input type="date" id="inp-date" /></div>
    <div class="field-group"><label>Montant (€)</label><input type="number" id="inp-price" placeholder="1500" min="0" step="0.01" /></div>
    <button class="btn-add" id="btn-add">+</button>
  </div>
  <div class="error-msg" id="error-msg">Veuillez remplir tous les champs.</div>
  <div class="invoice-list" id="invoice-list">
    <div class="empty-state" id="empty-state">Aucune facture ajoutée</div>
  </div>
</div>

<div class="card">
  <div class="section-label">Destinataire</div>
  <div class="client-row">
    <div class="field-group"><label>Nom / Société</label><input type="text" id="inp-client" placeholder="Société Dupont" /></div>
    <div class="field-group"><label>Civilité (optionnel)</label><input type="text" id="inp-civility" placeholder="Madame, Monsieur…" /></div>
  </div>
</div>

<div class="card">
  <div class="section-label">Options contextuelles</div>
  <div class="options-grid">
    <button class="opt-btn" data-key="joint" onclick="toggleOpt(this)"><span>📎</span> Facture en pièce jointe</button>
    <button class="opt-btn" data-key="phone" onclick="toggleOpt(this)"><span>📞</span> Suite à échange tél.</button>
    <button class="opt-btn" data-key="upcoming" onclick="toggleOpt(this)"><span>📅</span> Facture à venir</button>
    <button class="opt-btn" data-key="reminder2" onclick="toggleOpt(this)"><span>🔁</span> 2ème relance</button>
    <button class="opt-btn" data-key="urgent" onclick="toggleOpt(this)"><span>⚡</span> Urgent / dépassé</button>
  </div>
</div>

<div style="max-width:640px; margin: 0 auto 16px;">
  <button class="btn-generate" onclick="generate()">✉️ Générer la relance</button>
</div>

<div class="result-card card" id="result-card">
  <div class="result-header"><div class="section-label" style="margin:0">Mail généré</div></div>
  <div class="result-subject" id="result-subject-box">
    <span>Objet</span>
    <strong id="result-subject-text"></strong>
    <button class="btn-copy-subject" onclick="copySubject()">Copier</button>
  </div>
  <div class="mail-body" id="mail-body"></div>
  <button class="btn-copy" id="btn-copy" onclick="copyMail()">
    <span>📋</span><span id="copy-label">Copier le mail</span>
  </button>
  <button class="btn-reset" onclick="reset()">Nouvelle relance</button>
</div>

<script>
  let invoices = [];
  let activeOpts = new Set();

  document.getElementById('inp-num').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('inp-date').focus(); });
  document.getElementById('inp-date').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('inp-price').focus(); });
  document.getElementById('inp-price').addEventListener('keydown', e => { if (e.key === 'Enter') addInvoice(); });
  document.getElementById('btn-add').addEventListener('click', addInvoice);

  function addInvoice() {
    const num = document.getElementById('inp-num').value.trim();
    const date = document.getElementById('inp-date').value;
    const price = document.getElementById('inp-price').value;
    const err = document.getElementById('error-msg');
    if (!num || !date || !price) { err.style.display = 'block'; return; }
    err.style.display = 'none';
    invoices.push({ num, date, price: parseFloat(price) });
    renderList();
    document.getElementById('inp-num').value = '';
    document.getElementById('inp-date').value = '';
    document.getElementById('inp-price').value = '';
    document.getElementById('inp-num').focus();
  }

  function renderList() {
    const list = document.getElementById('invoice-list');
    list.innerHTML = '';
    if (invoices.length === 0) {
      list.innerHTML = '<div class="empty-state">Aucune facture ajoutée</div>';
      return;
    }
    invoices.forEach((inv, i) => {
      const item = document.createElement('div');
      item.className = 'invoice-item';
      item.innerHTML = `<span class="num">${inv.num}</span><span class="details">Échéance : ${formatDate(inv.date)}</span><span class="price">${formatPrice(inv.price)}</span><button class="btn-remove" onclick="removeInvoice(${i})">×</button>`;
      list.appendChild(item);
    });
  }

  function removeInvoice(i) { invoices.splice(i, 1); renderList(); }

  function toggleOpt(btn) {
    const key = btn.dataset.key;
    if (activeOpts.has(key)) { activeOpts.delete(key); btn.classList.remove('active'); }
    else { activeOpts.add(key); btn.classList.add('active'); }
  }

  function formatDate(d) { if (!d) return ''; const [y,m,day] = d.split('-'); return `${day}/${m}/${y}`; }
  function formatPrice(p) { return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(p); }
  function buildSubject() {
    if (invoices.length === 1) return `Relance – Facture ${invoices[0].num} – Échéance dépassée`;
    return `Relance – ${invoices.length} factures impayées`;
  }

  function generate() {
    if (invoices.length === 0) { alert('Ajoutez au moins une facture.'); return; }
    const client = document.getElementById('inp-client').value.trim();
    const civility = document.getElementById('inp-civility').value.trim();
    const isSecond = activeOpts.has('reminder2');
    const isUrgent = activeOpts.has('urgent');
    const isPhone = activeOpts.has('phone');
    const isJoint = activeOpts.has('joint');
    const isUpcoming = activeOpts.has('upcoming');

    let salut = civility ? `${civility},` : 'Madame, Monsieur,';
    let intro = '';
    if (isPhone) intro = `Faisant suite à notre échange téléphonique, je me permets de vous adresser ce rappel concernant ${invoices.length > 1 ? 'les factures suivantes, dont le règlement' : 'la facture suivante, dont le règlement'} n'a pas encore été réceptionné à ce jour.\n`;
    else if (isSecond) intro = `Sauf erreur de notre part, et malgré notre premier rappel, nous n'avons toujours pas reçu le règlement ${invoices.length > 1 ? 'des factures ci-dessous' : 'de la facture ci-dessous'}. Nous nous permettons donc de revenir vers vous.\n`;
    else if (isUrgent) intro = `Nous constatons que ${invoices.length > 1 ? 'les factures suivantes demeurent impayées' : 'la facture suivante demeure impayée'} bien au-delà de ${invoices.length > 1 ? 'leurs échéances respectives' : 'son échéance'}. Nous vous remercions de bien vouloir régulariser cette situation dans les plus brefs délais.\n`;
    else intro = `Nous nous permettons de revenir vers vous concernant ${invoices.length > 1 ? 'les factures suivantes, dont le règlement' : 'la facture suivante, dont le règlement'} ne nous est pas encore parvenu à ce jour.\n`;

    let factureBlock = '';
    if (invoices.length === 1) {
      factureBlock = `  • Facture n° ${invoices[0].num} — Échéance : ${formatDate(invoices[0].date)} — Montant : ${formatPrice(invoices[0].price)}`;
    } else {
      factureBlock = invoices.map(inv => `  • Facture n° ${inv.num} — Échéance : ${formatDate(inv.date)} — Montant : ${formatPrice(inv.price)}`).join('\n');
      factureBlock += `\n\n  Total dû : ${formatPrice(invoices.reduce((s,i) => s + i.price, 0))}`;
    }

    let extras = '';
    if (isJoint) extras += `\nVous trouverez ${invoices.length > 1 ? 'les factures concernées' : 'la facture concernée'} en pièce jointe de ce message.\n`;
    if (isUpcoming) extras += `\nSauf erreur de notre part, une nouvelle facture vous parviendra prochainement. Nous vous invitons à régulariser les montants en attente avant cette prochaine échéance.\n`;

    const closing = `\nSi vous avez déjà effectué ce règlement, nous vous remercions de nous faire parvenir votre avis de virement en réponse à ce mail afin que nous puissions mettre à jour nos dossiers.\n\nNous restons bien entendu disponibles pour tout renseignement complémentaire ou en cas de litige.\n\nCordialement,`;

    document.getElementById('result-subject-text').textContent = buildSubject();
    document.getElementById('mail-body').textContent = `${salut}\n\n${intro}\n${factureBlock}\n${extras}${closing}`;
    document.getElementById('result-card').classList.add('visible');
    document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyMail() {
    navigator.clipboard.writeText(document.getElementById('mail-body').textContent).then(() => {
      const label = document.getElementById('copy-label');
      label.textContent = '✓ Copié !';
      setTimeout(() => label.textContent = 'Copier le mail', 2500);
    });
  }

  function copySubject() {
    navigator.clipboard.writeText(document.getElementById('result-subject-text').textContent).then(() => {
      event.target.textContent = '✓';
      setTimeout(() => event.target.textContent = 'Copier', 2000);
    });
  }

  function reset() {
    invoices = []; activeOpts.clear(); renderList();
    document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('inp-client').value = '';
    document.getElementById('inp-civility').value = '';
    document.getElementById('result-card').classList.remove('visible');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
