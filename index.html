<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relance Facture</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F3EE; --surface: #FFFFFF; --border: #E2DDD6; --text: #1A1816;
    --muted: #8A8178; --accent: #FF69B4; --accent-light: #FFE4F3;
    --green: #2A7A4B; --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  [data-theme="dark"] {
    --bg: #1A1820; --surface: #242230; --border: #3A3650; --text: #F0EEF8;
    --muted: #9A94B0; --accent: #FF69B4; --accent-light: #3D1F35;
    --green: #3DAA6A; --shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px 16px 60px; transition: background 0.3s, color 0.3s; }
  header { max-width: 640px; margin: 0 auto 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; flex: 1; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .counter { background: var(--accent-light); border: 1.5px solid var(--accent); border-radius: 20px; padding: 4px 12px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); font-weight: 500; white-space: nowrap; }
  .date-badge { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); white-space: nowrap; }
  .btn-theme { background: var(--surface); border: 1.5px solid var(--border); border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .btn-theme:hover { border-color: var(--accent); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; max-width: 640px; margin: 0 auto 12px; box-shadow: var(--shadow); transition: background 0.3s, border-color 0.3s; }
  .section-label { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 12px; }
  .quick-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; align-items: end; }
  .field-group { display: flex; flex-direction: column; gap: 5px; }
  .field-group label { font-size: 11px; color: var(--muted); font-weight: 500; }
  input[type="text"], input[type="date"], input[type="number"], input[type="email"] { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--bg); transition: border-color 0.2s, box-shadow 0.2s, background 0.3s; outline: none; -webkit-appearance: none; }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  .btn-add { background: var(--accent); color: white; border: none; border-radius: 10px; width: 42px; height: 42px; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; flex-shrink: 0; align-self: end; }
  .btn-add:active { transform: scale(0.93); }
  .invoice-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .invoice-item { display: flex; align-items: center; gap: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .invoice-item .num { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--accent); min-width: 80px; }
  .invoice-item .details { flex: 1; font-size: 13px; color: var(--muted); }
  .invoice-item .price { font-weight: 600; font-size: 14px; color: var(--text); white-space: nowrap; }
  .btn-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 2px 4px; border-radius: 6px; transition: color 0.2s; }
  .btn-remove:hover { color: var(--accent); }
  .btn-generate { width: 100%; background: var(--accent); color: white; border: none; border-radius: 12px; padding: 15px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.1s, box-shadow 0.2s; }
  .btn-generate:hover { box-shadow: 0 4px 20px rgba(255,105,180,0.4); }
  .btn-generate:active { transform: scale(0.98); }
  .result-card { max-width: 640px; margin: 0 auto; display: none; }
  .result-card.visible { display: block; }
  .result-subject { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
  .result-subject .lbl { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; white-space: nowrap; }
  .result-subject .val { flex: 1; font-size: 13px; font-weight: 500; }
  .btn-copy-sm { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; font-size: 12px; cursor: pointer; color: var(--muted); font-family: 'DM Sans', sans-serif; white-space: nowrap; transition: all 0.15s; }
  .btn-copy-sm:hover { color: var(--green); border-color: var(--green); }
  .mail-body { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; font-size: 14px; line-height: 1.8; color: var(--text); white-space: pre-wrap; font-family: 'DM Sans', sans-serif; }
  .action-btns { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .btn-copy { width: 100%; background: var(--green); color: white; border: none; border-radius: 12px; padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; text-decoration: none; }
  .btn-outlook { width: 100%; background: #0078D4; color: white; border: none; border-radius: 12px; padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; text-decoration: none; }
  .btn-outlook.disabled { background: #ccc; pointer-events: none; }
  .btn-reset { background: none; border: 1.5px solid var(--border); border-radius: 12px; padding: 12px; width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .empty-state { text-align: center; padding: 16px; color: var(--muted); font-size: 13px; font-style: italic; }
  .error-msg { color: var(--accent); font-size: 12px; margin-top: 6px; display: none; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .flash-overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 9999; opacity: 0; transition: opacity 0.15s; }
  .flash-overlay.show { opacity: 1; }
  .flash-bubble { background: var(--green); color: white; font-family: 'DM Sans', sans-serif; font-size: 28px; font-weight: 700; padding: 20px 40px; border-radius: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.2); transform: scale(0.8); transition: transform 0.2s; }
  .flash-overlay.show .flash-bubble { transform: scale(1); }
  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 9998; overflow: hidden; }
  .confetti-piece { position: absolute; top: -20px; animation: confettiFall linear forwards; border-radius: 2px; }
  @keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
  @media (max-width: 480px) { .quick-row { grid-template-columns: 1fr 1fr; } .btn-add { grid-column: span 2; width: 100%; height: 42px; } .date-badge { display: none; } }
</style>
</head>
<body>

<div class="flash-overlay" id="flash-overlay"><div class="flash-bubble">✓ Copié !</div></div>
<div class="confetti-container" id="confetti-container"></div>

<header>
  <h1>💌 Relance Facture</h1>
  <div class="header-right">
    <span class="date-badge" id="date-badge"></span>
    <div class="counter" id="counter">0 relance aujourd'hui</div>
    <button class="btn-theme" id="btn-theme" onclick="toggleTheme()">🌙</button>
  </div>
</header>

<div class="card">
  <div class="section-label">Facture(s) à relancer</div>
  <div class="quick-row">
    <div class="field-group"><label>N° Facture</label><input type="text" id="inp-num" placeholder="2024-042" /></div>
    <div class="field-group"><label>Échéance</label><input type="date" id="inp-date" /></div>
    <div class="field-group"><label>Montant (€)</label><input type="number" id="inp-price" placeholder="1500" min="0" step="0.01" /></div>
    <button class="btn-add" id="btn-add">+</button>
  </div>
  <div class="error-msg" id="error-msg">Veuillez remplir tous les champs.</div>
  <div class="invoice-list" id="invoice-list"><div class="empty-state">Aucune facture ajoutée</div></div>
</div>

<div class="card">
  <div class="section-label">Destinataire</div>
  <div style="display:flex; flex-direction:column; gap:10px;">
    <div class="field-group"><label>Nom de société</label><input type="text" id="inp-company" placeholder="Société Dupont" /></div>
    <div class="field-group"><label>Adresse mail</label><input type="email" id="inp-email" placeholder="contact@societe.fr" /></div>
  </div>
  <p class="hint">Le lien Outlook sera pré-rempli avec ces informations.</p>
</div>

<div style="max-width:640px; margin: 0 auto 12px;">
  <button class="btn-generate" onclick="generate()">✉️ Générer la relance</button>
</div>

<div class="result-card card" id="result-card">
  <div class="section-label">Mail généré</div>
  <div class="result-subject">
    <span class="lbl">Objet</span>
    <span class="val" id="result-subject-text"></span>
    <button class="btn-copy-sm" onclick="copySubject(this)">Copier</button>
  </div>
  <div class="mail-body" id="mail-body"></div>
  <div class="action-btns">
    <button class="btn-copy" onclick="copyMail()"><span>📋</span><span id="copy-label">Copier le mail</span></button>
    <a class="btn-outlook" id="btn-outlook" href="#" target="_blank"><span>📧</span><span>Ouvrir dans Outlook</span></a>
    <button class="btn-reset" onclick="reset()">Nouvelle relance</button>
  </div>
  <div style="margin-top: 16px;">
    <div class="section-label">📋 Note Clearnox</div>
    <div style="position:relative;">
      <div class="mail-body" id="clearnox-note" style="font-family:'DM Mono',monospace; font-size:12px; color:var(--muted); background:var(--accent-light); border-color:var(--accent);"></div>
      <button class="btn-copy-sm" id="btn-copy-clearnox" onclick="copyClearnox()" style="position:absolute; top:10px; right:10px;">Copier</button>
    </div>
  </div>
</div>

<script>
  let invoices = [];
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  const todayKey = 'relances_' + yyyy + mm + dd;
  document.getElementById('date-badge').textContent = dd + '/' + mm + '/' + yyyy;
  let relancesCount = parseInt(localStorage.getItem(todayKey) || '0');

  function updateCounter() {
    const c = relancesCount;
    document.getElementById('counter').textContent = c + ' relance' + (c > 1 ? 's' : '') + ' aujourd\'hui';
    localStorage.setItem(todayKey, c);
  }

  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('btn-theme').textContent = isDark ? '🌙' : '☀️';
  }

  function playSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
    } catch(e) {}
  }

  function showFlash() {
    const overlay = document.getElementById('flash-overlay');
    overlay.classList.add('show');
    setTimeout(() => overlay.classList.remove('show'), 900);
  }

  function launchConfetti() {
    const container = document.getElementById('confetti-container');
    const colors = ['#FF69B4','#FFB6C1','#FF1493','#FFC0CB','#2A7A4B','#0078D4','#FFD700'];
    for (let i = 0; i < 60; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.width = (Math.random() * 8 + 6) + 'px';
      piece.style.height = (Math.random() * 8 + 6) + 'px';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      piece.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
      piece.style.animationDelay = Math.random() * 0.5 + 's';
      container.appendChild(piece);
      setTimeout(() => piece.remove(), 3500);
    }
  }

  window.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const company = params.get('company');
    const email = params.get('email');
    const invoicesParam = params.get('invoices');
    if (company) document.getElementById('inp-company').value = company;
    if (email) document.getElementById('inp-email').value = email;
    if (invoicesParam) {
      try {
        const parsed = JSON.parse(decodeURIComponent(invoicesParam));
        parsed.forEach(inv => {
          if (inv.num && inv.echeance) {
            let dateFormatted = inv.echeance;
            const parts = inv.echeance.split('/');
            if (parts.length === 3) dateFormatted = parts[2] + '-' + parts[1] + '-' + parts[0];
            invoices.push({ num: inv.num, date: dateFormatted, price: parseFloat(inv.montant) || 0 });
          }
        });
        renderList();
        if (invoices.length > 0 && company) setTimeout(() => generate(), 300);
      } catch(e) {}
    }
  });

  document.getElementById('inp-num').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('inp-date').focus(); });
  document.getElementById('inp-date').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('inp-price').focus(); });
  document.getElementById('inp-price').addEventListener('keydown', e => { if (e.key === 'Enter') addInvoice(); });
  document.getElementById('btn-add').addEventListener('click', addInvoice);

  function addInvoice() {
    const num = document.getElementById('inp-num').value.trim();
    const date = document.getElementById('inp-date').value;
    const price = document.getElementById('inp-price').value;
    const err = document.getElementById('error-msg');
    if (!num || !date || !price) { err.style.display = 'block'; return; }
    err.style.display = 'none';
    invoices.push({ num, date, price: parseFloat(price) });
    renderList();
    document.getElementById('inp-num').value = '';
    document.getElementById('inp-date').value = '';
    document.getElementById('inp-price').value = '';
    document.getElementById('inp-num').focus();
  }

  function renderList() {
    const list = document.getElementById('invoice-list');
    list.innerHTML = '';
    if (invoices.length === 0) { list.innerHTML = '<div class="empty-state">Aucune facture ajoutée</div>'; return; }
    invoices.forEach((inv, i) => {
      const item = document.createElement('div');
      item.className = 'invoice-item';
      item.innerHTML = '<span class="num">' + inv.num + '</span><span class="details">Échéance : ' + formatDate(inv.date) + '</span><span class="price">' + formatPrice(inv.price) + '</span><button class="btn-remove" onclick="removeInvoice(' + i + ')">×</button>';
      list.appendChild(item);
    });
  }

  function removeInvoice(i) { invoices.splice(i, 1); renderList(); }

  function formatDate(d) {
    if (!d) return '';
    const parts = d.split('-');
    return parts[2] + '/' + parts[1] + '/' + parts[0];
  }

  function formatPrice(p) {
    return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', minimumFractionDigits: 2 }).format(p);
  }

  function buildSubject() {
    const company = document.getElementById('inp-company').value.trim();
    return 'RETARD DE PAIEMENT PENELOPE' + (company ? ' - ' + company.toUpperCase() : '');
  }

  function buildBody() {
    const plusieurs = invoices.length > 1;
    const laLes = plusieurs ? 'des factures ci-dessous' : 'de la facture ci-dessous';
    let intro = 'Bonjour,\n\nJe me permets de vous contacter concernant le règlement ' + laLes + ', dont l\'échéance est désormais dépassée :';
    let factureBlock = '';
    if (invoices.length === 1) {
      const inv = invoices[0];
      factureBlock = 'Facture n° ' + inv.num + ', échéance au ' + formatDate(inv.date) + ', montant ' + formatPrice(inv.price) + '.';
    } else {
      factureBlock = invoices.map(inv => 'Facture n° ' + inv.num + ', échéance au ' + formatDate(inv.date) + ', montant ' + formatPrice(inv.price) + '.').join('\n');
    }
    const closing = '\nSi le paiement a déjà été effectué, je vous remercie de bien vouloir nous transmettre l\'avis de règlement en retour de mail.\n\nCordialement,\nLouiza Hadid\nService recouvrement du groupe Pénélope\n0142001145';
    return intro + '\n' + factureBlock + '\n' + closing;
  }

  function generate() {
    if (invoices.length === 0) { alert('Ajoutez au moins une facture.'); return; }
    const subject = buildSubject();
    const body = buildBody();
    const email = document.getElementById('inp-email').value.trim();
    document.getElementById('result-subject-text').textContent = subject;
    document.getElementById('mail-body').textContent = body;
    document.getElementById('result-card').classList.add('visible');
    const btn = document.getElementById('btn-outlook');
    btn.href = 'https://outlook.office.com/mail/deeplink/compose?to=' + encodeURIComponent(email) + '&subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
    if (!email) { btn.classList.add('disabled'); btn.querySelector('span:last-child').textContent = 'Ouvrir dans Outlook (mail manquant)'; }
    else { btn.classList.remove('disabled'); btn.querySelector('span:last-child').textContent = 'Ouvrir dans Outlook'; }
    document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
    document.getElementById('copy-label').textContent = 'Copier le mail';
    const nums = invoices.map(inv => inv.num).join(' / ');
    document.getElementById('clearnox-note').textContent = yyyy + '/' + mm + '/' + dd + ' LH relance mail à ' + email + ' facture ' + nums;
    relancesCount++;
    updateCounter();
    playSound();
    launchConfetti();
  }

  function copyMail() {
    navigator.clipboard.writeText(document.getElementById('mail-body').textContent).then(() => {
      showFlash();
      const label = document.getElementById('copy-label');
      label.textContent = '✓ Copié !';
      setTimeout(() => label.textContent = 'Copier le mail', 2500);
    });
  }

  function copySubject(btn) {
    navigator.clipboard.writeText(document.getElementById('result-subject-text').textContent).then(() => {
      showFlash(); btn.textContent = '✓';
      setTimeout(() => btn.textContent = 'Copier', 2000);
    });
  }

  function copyClearnox() {
    navigator.clipboard.writeText(document.getElementById('clearnox-note').textContent).then(() => {
      showFlash();
      const b = document.getElementById('btn-copy-clearnox');
      b.textContent = '✓ Copié !';
      setTimeout(() => b.textContent = 'Copier', 2500);
    });
  }

  function reset() {
    invoices = [];
    renderList();
    document.getElementById('inp-email').value = '';
    document.getElementById('inp-company').value = '';
    document.getElementById('result-card').classList.remove('visible');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  updateCounter();
</script>
</body>
</html>
