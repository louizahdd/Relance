<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relance · Pénélope</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FFF0F7;
    --surface: rgba(255,255,255,0.75);
    --border: rgba(255,105,180,0.2);
    --text: #2D1B2E;
    --muted: #9B7FA0;
    --accent: #FF69B4;
    --accent2: #FF3D9A;
    --accent-light: rgba(255,105,180,0.12);
    --green: #1A8C5B;
    --blue: #0078D4;
    --shadow: 0 8px 32px rgba(255,105,180,0.15);
    --glow: 0 0 40px rgba(255,105,180,0.2);
  }

  [data-theme="dark"] {
    --bg: #1A0D1E;
    --surface: rgba(40,20,50,0.8);
    --border: rgba(255,105,180,0.25);
    --text: #F5E6FA;
    --muted: #C9A8D4;
    --accent: #FF69B4;
    --accent2: #FF3D9A;
    --accent-light: rgba(255,105,180,0.15);
    --green: #2ECC8A;
    --blue: #4BA3E3;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
    --glow: 0 0 60px rgba(255,105,180,0.15);
  }

  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 0 80px; overflow-x: hidden; transition: background 0.4s, color 0.4s; }

  .bg-blobs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.35; animation: blobFloat ease-in-out infinite alternate; }
  .blob-1 { width: 500px; height: 500px; background: #FF69B4; top: -150px; left: -150px; animation-duration: 8s; }
  .blob-2 { width: 400px; height: 400px; background: #FFB6D9; top: 30%; right: -100px; animation-duration: 11s; animation-delay: -3s; }
  .blob-3 { width: 350px; height: 350px; background: #FF3D9A; bottom: -100px; left: 30%; animation-duration: 9s; animation-delay: -5s; }
  @keyframes blobFloat { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(30px,20px) scale(1.05); } }
  [data-theme="dark"] .blob { opacity: 0.15; }

  .wrapper { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; padding: 0 20px; }

  .header { padding: 40px 0 32px; display: flex; align-items: center; gap: 16px; }
  .header-left { flex: 1; }
  .header-title { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 600; letter-spacing: -0.5px; line-height: 1.1; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .pill { background: var(--accent-light); border: 1.5px solid var(--border); border-radius: 100px; padding: 6px 14px; font-size: 12px; font-weight: 600; color: var(--accent); white-space: nowrap; backdrop-filter: blur(10px); }
  .date-pill { font-size: 11px; color: var(--muted); font-weight: 500; }
  .btn-theme { background: var(--surface); border: 1.5px solid var(--border); border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 17px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; backdrop-filter: blur(10px); flex-shrink: 0; box-shadow: var(--shadow); }
  .btn-theme:hover { transform: scale(1.1); border-color: var(--accent); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 24px; margin-bottom: 14px; backdrop-filter: blur(20px); box-shadow: var(--shadow); transition: background 0.4s, border-color 0.4s, transform 0.2s; }
  .card:hover { transform: translateY(-1px); }

  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .quick-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-group label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; }

  input[type="text"], input[type="date"], input[type="number"], input[type="email"] { width: 100%; border: 1.5px solid var(--border); border-radius: 14px; padding: 11px 14px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; color: var(--text); background: rgba(255,255,255,0.5); transition: all 0.2s; outline: none; -webkit-appearance: none; backdrop-filter: blur(5px); }
  [data-theme="dark"] input { background: rgba(255,255,255,0.06); }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-light); background: rgba(255,255,255,0.8); }
  [data-theme="dark"] input:focus { background: rgba(255,255,255,0.1); }

  .btn-add { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; border: none; border-radius: 14px; width: 44px; height: 44px; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; align-self: end; box-shadow: 0 4px 16px rgba(255,105,180,0.4); }
  .btn-add:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(255,105,180,0.5); }
  .btn-add:active { transform: scale(0.95); }

  .invoice-list { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
  .invoice-item { display: flex; align-items: center; gap: 12px; background: var(--accent-light); border: 1px solid var(--border); border-radius: 14px; padding: 12px 16px; animation: slideIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .invoice-item.avenir { background: rgba(0,120,212,0.08); border-color: rgba(0,120,212,0.25); }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .invoice-item .num { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 600; color: var(--accent2); min-width: 90px; }
  .invoice-item.avenir .num { color: var(--blue); }
  .invoice-item .details { flex: 1; font-size: 12px; color: var(--muted); font-weight: 500; }
  .invoice-item .price { font-weight: 700; font-size: 14px; color: var(--text); white-space: nowrap; }
  .btn-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; padding: 2px 6px; border-radius: 8px; transition: all 0.15s; line-height: 1; }
  .btn-remove:hover { color: var(--accent2); background: rgba(255,61,154,0.1); }

  .btn-generate { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; border: none; border-radius: 18px; padding: 18px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; letter-spacing: 0.3px; transition: all 0.2s; box-shadow: 0 6px 24px rgba(255,105,180,0.45); position: relative; overflow: hidden; }
  .btn-generate::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent); opacity: 0; transition: opacity 0.2s; }
  .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(255,105,180,0.55); }
  .btn-generate:hover::before { opacity: 1; }
  .btn-generate:active { transform: translateY(0) scale(0.99); }

  .result-card { display: none; }
  .result-card.visible { display: block; }

  .subject-box { background: var(--accent-light); border: 1px solid var(--border); border-radius: 14px; padding: 12px 16px; margin-bottom: 14px; display: flex; align-items: center; gap: 12px; }
  .subject-box .lbl { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); white-space: nowrap; }
  .subject-box .val { flex: 1; font-size: 13px; font-weight: 600; color: var(--text); }

  .btn-copy-sm { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--accent); font-family: 'Plus Jakarta Sans', sans-serif; white-space: nowrap; transition: all 0.15s; box-shadow: 0 2px 8px rgba(255,105,180,0.1); }
  [data-theme="dark"] .btn-copy-sm { background: rgba(255,255,255,0.1); }
  .btn-copy-sm:hover { background: var(--accent); color: white; border-color: var(--accent); transform: scale(1.03); }

  .mail-body { background: rgba(255,255,255,0.6); border: 1px solid var(--border); border-radius: 16px; padding: 22px; font-size: 14px; line-height: 1.9; color: var(--text); white-space: pre-wrap; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 400; backdrop-filter: blur(5px); }
  [data-theme="dark"] .mail-body { background: rgba(255,255,255,0.05); }

  .action-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }

  .btn-copy { width: 100%; background: linear-gradient(135deg, #1A8C5B, #15735A); color: white; border: none; border-radius: 16px; padding: 15px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; text-decoration: none; box-shadow: 0 4px 16px rgba(26,140,91,0.35); }
  .btn-copy:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(26,140,91,0.45); }

  .btn-outlook { width: 100%; background: linear-gradient(135deg, #0078D4, #005FA3); color: white; border: none; border-radius: 16px; padding: 15px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; text-decoration: none; box-shadow: 0 4px 16px rgba(0,120,212,0.35); }
  .btn-outlook:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(0,120,212,0.45); }
  .btn-outlook.disabled { background: linear-gradient(135deg, #ccc, #bbb); box-shadow: none; pointer-events: none; }

  .btn-reset { background: transparent; border: 1.5px solid var(--border); border-radius: 16px; padding: 13px; width: 100%; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 600; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .btn-reset:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  .clearnox-box { background: linear-gradient(135deg, rgba(255,105,180,0.08), rgba(255,61,154,0.05)); border: 1.5px solid var(--border); border-radius: 16px; padding: 16px; font-size: 12px; color: var(--muted); font-weight: 500; line-height: 1.6; position: relative; margin-top: 16px; }

  .empty-state { text-align: center; padding: 20px; color: var(--muted); font-size: 13px; font-style: italic; }
  .error-msg { color: var(--accent2); font-size: 12px; font-weight: 600; margin-top: 8px; display: none; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 8px; font-weight: 500; }

  .flash-overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 9999; opacity: 0; transition: opacity 0.15s; }
  .flash-overlay.show { opacity: 1; }
  .flash-bubble { background: linear-gradient(135deg, var(--green), #15735A); color: white; font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 600; padding: 22px 48px; border-radius: 24px; box-shadow: 0 12px 48px rgba(26,140,91,0.4); transform: scale(0.8) translateY(10px); transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .flash-overlay.show .flash-bubble { transform: scale(1) translateY(0); }

  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 9998; overflow: hidden; }
  .confetti-piece { position: absolute; top: -20px; animation: confettiFall linear forwards; }
  @keyframes confettiFall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

  .generate-wrap { margin: 0 0 14px; }

  @media (max-width: 480px) {
    .quick-row { grid-template-columns: 1fr 1fr; }
    .btn-add { grid-column: span 2; width: 100%; height: 44px; }
    .date-pill { display: none; }
    .header-title { font-size: 26px; }
  }
</style>
</head>
<body>

<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="flash-overlay" id="flash-overlay"><div class="flash-bubble">✓ Copié !</div></div>
<div class="confetti-container" id="confetti-container"></div>

<div class="wrapper">

  <div class="header">
    <div class="header-left">
      <div class="header-title">💌 Relance</div>
    </div>
    <div class="header-right">
      <span class="date-pill" id="date-badge"></span>
      <div class="pill" id="counter">0 relance</div>
      <button class="btn-theme" id="btn-theme" onclick="toggleTheme()">🌙</button>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Factures à relancer</div>
    <div class="quick-row">
      <div class="field-group"><label>N° Facture</label><input type="text" id="inp-num" placeholder="1135498" /></div>
      <div class="field-group"><label>Échéance</label><input type="date" id="inp-date" /></div>
      <div class="field-group"><label>Montant €</label><input type="number" id="inp-price" placeholder="1500" min="0" step="0.01" /></div>
      <button class="btn-add" id="btn-add">+</button>
    </div>
    <div class="error-msg" id="error-msg">Veuillez remplir tous les champs.</div>
    <div class="invoice-list" id="invoice-list"><div class="empty-state">✦ Aucune facture ajoutée</div></div>
  </div>

  <div class="card">
    <div class="section-label">Destinataire</div>
    <div style="display:flex; flex-direction:column; gap:12px;">
      <div class="field-group"><label>Nom de société</label><input type="text" id="inp-company" placeholder="Société Dupont" /></div>
      <div class="field-group"><label>Adresse mail</label><input type="email" id="inp-email" placeholder="contact@societe.fr" /></div>
    </div>
    <p class="hint">✦ Le lien Outlook sera pré-rempli automatiquement.</p>
  </div>

  <div class="generate-wrap">
    <button class="btn-generate" onclick="generate()">✉︎ &nbsp;Générer la relance</button>
  </div>

  <div class="card result-card" id="result-card">
    <div class="section-label">Mail généré</div>
    <div class="subject-box">
      <span class="lbl">Objet</span>
      <span class="val" id="result-subject-text"></span>
      <button class="btn-copy-sm" onclick="copySubject(this)">Copier</button>
    </div>
    <div class="mail-body" id="mail-body"></div>
    <div class="action-btns">
      <button class="btn-copy" onclick="copyMail()"><span>📋</span><span id="copy-label">Copier le mail</span></button>
      <a class="btn-outlook" id="btn-outlook" href="#" target="_blank"><span>📧</span><span>Ouvrir dans Outlook</span></a>
      <button class="btn-reset" onclick="reset()">Nouvelle relance</button>
    </div>
    <div class="clearnox-box">
      <div style="font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--accent); margin-bottom:8px;">📋 Note Clearnox</div>
      <div id="clearnox-note"></div>
      <button class="btn-copy-sm" id="btn-copy-clearnox" onclick="copyClearnox()" style="margin-top:10px;">Copier</button>
    </div>
  </div>

</div>

<script>
  let invoices = [];
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  const todayKey = 'relances_' + yyyy + mm + dd;
  document.getElementById('date-badge').textContent = dd + '/' + mm + '/' + yyyy;
  let relancesCount = parseInt(localStorage.getItem(todayKey) || '0');

  function updateCounter() {
    const c = relancesCount;
    document.getElementById('counter').textContent = c + ' relance' + (c > 1 ? 's' : '');
    localStorage.setItem(todayKey, c);
  }

  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('btn-theme').textContent = isDark ? '🌙' : '☀️';
  }

  function playSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
    } catch(e) {}
  }

  function showFlash() {
    const overlay = document.getElementById('flash-overlay');
    overlay.classList.add('show');
    setTimeout(() => overlay.classList.remove('show'), 900);
  }

  function launchConfetti() {
    const container = document.getElementById('confetti-container');
    const colors = ['#FF69B4','#FFB6C1','#FF3D9A','#FFC0CB','#1A8C5B','#0078D4','#FFD700','#FF69B4','#fff'];
    for (let i = 0; i < 70; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.width = (Math.random() * 9 + 5) + 'px';
      piece.style.height = (Math.random() * 9 + 5) + 'px';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
      piece.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
      piece.style.animationDelay = Math.random() * 0.6 + 's';
      container.appendChild(piece);
      setTimeout(() => piece.remove(), 3500);
    }
  }

  window.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const company = params.get('company');
    const email = params.get('email');
    const invoicesParam = params.get('invoices');
    if (company) document.getElementById('inp-company').value = company;
    if (email) document.getElementById('inp-email').value = email;
    if (invoicesParam) {
      try {
        const parsed = JSON.parse(decodeURIComponent(invoicesParam));
        parsed.forEach(inv => {
          if (inv.num && inv.echeance) {
            let dateFormatted = inv.echeance;
            const parts = inv.echeance.split('/');
            if (parts.length === 3) dateFormatted = parts[2] + '-' + parts[1] + '-' + parts[0];
            invoices.push({ num: inv.num, date: dateFormatted, price: parseFloat(inv.montant) || 0, avenir: !!inv.avenir });
          }
        });
        renderList();
        if (invoices.length > 0 && company) setTimeout(() => generate(), 300);
      } catch(e) {}
    }
  });

  document.getElementById('inp-num').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('inp-date').focus(); });
  document.getElementById('inp-date').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('inp-price').focus(); });
  document.getElementById('inp-price').addEventListener('keydown', e => { if (e.key === 'Enter') addInvoice(); });
  document.getElementById('btn-add').addEventListener('click', addInvoice);

  function addInvoice() {
    const num = document.getElementById('inp-num').value.trim();
    const date = document.getElementById('inp-date').value;
    const price = document.getElementById('inp-price').value;
    const err = document.getElementById('error-msg');
    if (!num || !date || !price) { err.style.display = 'block'; return; }
    err.style.display = 'none';
    invoices.push({ num, date, price: parseFloat(price), avenir: false });
    renderList();
    document.getElementById('inp-num').value = '';
    document.getElementById('inp-date').value = '';
    document.getElementById('inp-price').value = '';
    document.getElementById('inp-num').focus();
  }

  function renderList() {
    const list = document.getElementById('invoice-list');
    list.innerHTML = '';
    if (invoices.length === 0) { list.innerHTML = '<div class="empty-state">✦ Aucune facture ajoutée</div>'; return; }
    invoices.forEach((inv, i) => {
      const item = document.createElement('div');
      item.className = 'invoice-item' + (inv.avenir ? ' avenir' : '');
      item.innerHTML = '<span class="num">' + inv.num + '</span><span class="details">' + (inv.avenir ? '🔜 À venir · ' : '⚠️ Échue · ') + formatDate(inv.date) + '</span><span class="price">' + formatPrice(inv.price) + '</span><button class="btn-remove" onclick="removeInvoice(' + i + ')">×</button>';
      list.appendChild(item);
    });
  }

  function removeInvoice(i) { invoices.splice(i, 1); renderList(); }

  function formatDate(d) {
    if (!d) return '';
    const p = d.split('-');
    return p[2] + '/' + p[1] + '/' + p[0];
  }

  function formatPrice(p) {
    return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', minimumFractionDigits: 2 }).format(p);
  }

  function buildSubject() {
    const company = document.getElementById('inp-company').value.trim();
    return 'RETARD DE PAIEMENT PENELOPE' + (company ? ' - ' + company.toUpperCase() : '');
  }

  function buildBody() {
    const enRetard = invoices.filter(inv => !inv.avenir);
    const aVenir = invoices.filter(inv => inv.avenir);
    const plusieurs = enRetard.length > 1;
    const laLes = plusieurs ? 'des factures ci-dessous' : 'de la facture ci-dessous';
    let intro = 'Bonjour,\n\nJe me permets de vous contacter concernant le règlement ' + laLes + ', dont l\'échéance est désormais dépassée :';
    let factureBlock = '';
    if (enRetard.length === 1) {
      const inv = enRetard[0];
      factureBlock = 'Facture n° ' + inv.num + ', échéance au ' + formatDate(inv.date) + ', montant ' + formatPrice(inv.price) + '.';
    } else {
      factureBlock = enRetard.map(inv => 'Facture n° ' + inv.num + ', échéance au ' + formatDate(inv.date) + ', montant ' + formatPrice(inv.price) + '.').join('\n');
    }
    let aVenirBlock = '';
    if (aVenir.length === 1) {
      aVenirBlock = '\nPar ailleurs, nous vous informons que la facture n° ' + aVenir[0].num + ' d\'un montant de ' + formatPrice(aVenir[0].price) + ' arrivera à échéance le ' + formatDate(aVenir[0].date) + '. Nous vous remercions de bien vouloir en tenir compte.';
    } else if (aVenir.length > 1) {
      aVenirBlock = '\nPar ailleurs, nous vous informons que les factures suivantes arriveront prochainement à échéance :\n' + aVenir.map(inv => 'Facture n° ' + inv.num + ', échéance le ' + formatDate(inv.date) + ', montant ' + formatPrice(inv.price) + '.').join('\n') + '\nNous vous remercions de bien vouloir en tenir compte.';
    }
    const closing = '\nSi le paiement a déjà été effectué, je vous remercie de bien vouloir nous transmettre l\'avis de règlement en retour de mail.\n\nCordialement,\nLouiza Hadid\nService recouvrement du groupe Pénélope\n0142001145';
    return intro + '\n' + factureBlock + aVenirBlock + '\n' + closing;
  }

  function generate() {
    const enRetard = invoices.filter(inv => !inv.avenir);
    if (enRetard.length === 0) { alert('Ajoutez au moins une facture en retard.'); return; }
    const subject = buildSubject();
    const body = buildBody();
    const email = document.getElementById('inp-email').value.trim();
    document.getElementById('result-subject-text').textContent = subject;
    document.getElementById('mail-body').textContent = body;
    document.getElementById('result-card').classList.add('visible');
    const btn = document.getElementById('btn-outlook');
    btn.href = 'https://outlook.office.com/mail/deeplink/compose?to=' + encodeURIComponent(email) + '&subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
    if (!email) { btn.classList.add('disabled'); btn.querySelector('span:last-child').textContent = 'Ouvrir dans Outlook (mail manquant)'; }
    else { btn.classList.remove('disabled'); btn.querySelector('span:last-child').textContent = 'Ouvrir dans Outlook'; }
    document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
    document.getElementById('copy-label').textContent = 'Copier le mail';
    const nums = invoices.map(inv => inv.num).join(' / ');
    document.getElementById('clearnox-note').textContent = yyyy + '/' + mm + '/' + dd + ' LH relance mail à ' + email + ' facture ' + nums;
    relancesCount++;
    updateCounter();
    playSound();
    launchConfetti();
  }

  function copyMail() {
    navigator.clipboard.writeText(document.getElementById('mail-body').textContent).then(() => {
      showFlash();
      const label = document.getElementById('copy-label');
      label.textContent = '✓ Copié !';
      setTimeout(() => label.textContent = 'Copier le mail', 2500);
    });
  }

  function copySubject(btn) {
    navigator.clipboard.writeText(document.getElementById('result-subject-text').textContent).then(() => {
      showFlash(); btn.textContent = '✓';
      setTimeout(() => btn.textContent = 'Copier', 2000);
    });
  }

  function copyClearnox() {
    navigator.clipboard.writeText(document.getElementById('clearnox-note').textContent).then(() => {
      showFlash();
      const b = document.getElementById('btn-copy-clearnox');
      b.textContent = '✓ Copié !';
      setTimeout(() => b.textContent = 'Copier', 2500);
    });
  }

  function reset() {
    invoices = [];
    renderList();
    document.getElementById('inp-email').value = '';
    document.getElementById('inp-company').value = '';
    document.getElementById('result-card').classList.remove('visible');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  updateCounter();
</script>
</body>
</html>
