<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relance Facture</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F3EE;
    --surface: #FFFFFF;
    --border: #E2DDD6;
    --text: #1A1816;
    --muted: #8A8178;
    --accent: #C84B2F;
    --accent-light: #F5EAE7;
    --green: #2A7A4B;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px 16px 60px; }
  header { max-width: 640px; margin: 0 auto 24px; display: flex; align-items: baseline; gap: 12px; }
  header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
  header span { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; max-width: 640px; margin: 0 auto 12px; box-shadow: var(--shadow); }
  .section-label { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 12px; }

  .quick-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; align-items: end; }
  .field-group { display: flex; flex-direction: column; gap: 5px; }
  .field-group label { font-size: 11px; color: var(--muted); font-weight: 500; }

  input[type="text"], input[type="date"], input[type="number"], input[type="email"] {
    width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--bg);
    transition: border-color 0.2s, box-shadow 0.2s; outline: none; -webkit-appearance: none;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }

  .btn-add { background: var(--accent); color: white; border: none; border-radius: 10px; width: 42px; height: 42px; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; flex-shrink: 0; align-self: end; }
  .btn-add:active { transform: scale(0.93); }

  .invoice-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .invoice-item { display: flex; align-items: center; gap: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .invoice-item .num { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--accent); min-width: 80px; }
  .invoice-item .details { flex: 1; font-size: 13px; color: var(--muted); }
  .invoice-item .price { font-weight: 600; font-size: 14px; color: var(--text); white-space: nowrap; }
  .btn-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 2px 4px; border-radius: 6px; }

  .options-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .opt-btn { display: flex; align-items: center; gap: 7px; padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 50px; background: var(--bg); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted); transition: all 0.15s; user-select: none; }
  .opt-btn.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 500; }

  .btn-generate { width: 100%; background: var(--accent); color: white; border: none; border-radius: 12px; padding: 15px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.1s; }
  .btn-generate:active { transform: scale(0.98); }

  .result-card { max-width: 640px; margin: 0 auto; display: none; }
  .result-card.visible { display: block; }

  .result-subject { background: #EDE9E3; border-radius: 10px; padding: 10px 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
  .result-subject .lbl { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; white-space: nowrap; }
  .result-subject .val { flex: 1; font-size: 13px; font-weight: 500; }
  .btn-copy-sm { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; font-size: 12px; cursor: pointer; color: var(--muted); font-family: 'DM Sans', sans-serif; white-space: nowrap; transition: all 0.15s; }

  .mail-body { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; font-size: 14px; line-height: 1.8; color: var(--text); white-space: pre-wrap; font-family: 'DM Sans', sans-serif; }

  .action-btns { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .btn-copy { width: 100%; background: var(--green); color: white; border: none; border-radius: 12px; padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
  .btn-outlook { width: 100%; background: #0078D4; color: white; border: none; border-radius: 12px; padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
  .btn-outlook.disabled { background: #ccc; pointer-events: none; }
  .btn-reset { background: none; border: 1.5px solid var(--border); border-radius: 12px; padding: 12px; width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--muted); cursor: pointer; }

  .empty-state { text-align: center; padding: 16px; color: var(--muted); font-size: 13px; font-style: italic; }
  .error-msg { color: var(--accent); font-size: 12px; margin-top: 6px; display: none; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 6px; }

  @media (max-width: 480px) {
    .quick-row { grid-template-columns: 1fr 1fr; }
    .btn-add { grid-column: span 2; width: 100%; height: 42px; }
  }
</style>
</head>
<body>

<header>
  <h1>Relance Facture</h1>
  <span>Pénélope</span>
</header>

<div class="card">
  <div class="section-label">Facture(s) à relancer</div>
  <div class="quick-row">
    <div class="field-group"><label>N° Facture</label><input type="text" id="inp-num" placeholder="2024-042" /></div>
    <div class="field-group"><label>Échéance</label><input type="date" id="inp-date" /></div>
    <div class="field-group"><label>Montant (€)</label><input type="number" id="inp-price" placeholder="1500" min="0" step="0.01" /></div>
    <button class="btn-add" id="btn-add">+</button>
  </div>
  <div class="error-msg" id="error-msg">Veuillez remplir tous les champs.</div>
  <div class="invoice-list" id="invoice-list">
    <div class="empty-state">Aucune facture ajoutée</div>
  </div>
</div>

<div class="card">
  <div class="section-label">Destinataire</div>
  <div style="display:flex; flex-direction:column; gap:10px;">
    <div class="field-group">
      <label>Nom de société</label>
      <input type="text" id="inp-company" placeholder="Société Dupont" />
    </div>
    <div class="field-group">
      <label>Adresse mail</label>
      <input type="email" id="inp-email" placeholder="contact@societe.fr" />
    </div>
  </div>
  <p class="hint">Le lien Outlook sera pré-rempli avec ces informations.</p>
</div>

<div class="card">
  <div class="section-label">Options contextuelles</div>
  <div class="options-grid">
    <button class="opt-btn" data-key="joint" onclick="toggleOpt(this)">📎 Facture en PJ</button>
    <button class="opt-btn" data-key="phone" onclick="toggleOpt(this)">📞 Suite échange tél.</button>
    <button class="opt-btn" data-key="reminder2" onclick="toggleOpt(this)">🔁 2ème relance</button>
    <button class="opt-btn" data-key="urgent" onclick="toggleOpt(this)">⚡ Urgent</button>
  </div>
</div>

<div style="max-width:640px; margin: 0 auto 12px;">
  <button class="btn-generate" onclick="generate()">✉️ Générer la relance</button>
</div>

<div class="result-card card" id="result-card">
  <div class="section-label">Mail généré</div>
  <div class="result-subject">
    <span class="lbl">Objet</span>
    <span class="val" id="result-subject-text"></span>
    <button class="btn-copy-sm" onclick="copySubject()">Copier</button>
  </div>
  <div class="mail-body" id="mail-body"></div>
  <div class="action-btns">
    <button class="btn-copy" onclick="copyMail()"><span>📋</span><span id="copy-label">Copier le mail</span></button>
    <a class="btn-outlook" id="btn-outlook" href="#" target="_blank"><span>📧</span><span id="outlook-label">Ouvrir dans Outlook</span></a>
    <button class="btn-reset" onclick="reset()">Nouvelle relance</button>
  </div>
</div>

<script>
  let invoices = [];
  let activeOpts = new Set();

  document.getElementById('inp-num').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('inp-date').focus(); });
  document.getElementById('inp-date').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('inp-price').focus(); });
  document.getElementById('inp-price').addEventListener('keydown', e => { if (e.key === 'Enter') addInvoice(); });
  document.getElementById('btn-add').addEventListener('click', addInvoice);

  function addInvoice() {
    const num = document.getElementById('inp-num').value.trim();
    const date = document.getElementById('inp-date').value;
    const price = document.getElementById('inp-price').value;
    const err = document.getElementById('error-msg');
    if (!num || !date || !price) { err.style.display = 'block'; return; }
    err.style.display = 'none';
    invoices.push({ num, date, price: parseFloat(price) });
    renderList();
    document.getElementById('inp-num').value = '';
    document.getElementById('inp-date').value = '';
    document.getElementById('inp-price').value = '';
    document.getElementById('inp-num').focus();
  }

  function renderList() {
    const list = document.getElementById('invoice-list');
    list.innerHTML = '';
    if (invoices.length === 0) { list.innerHTML = '<div class="empty-state">Aucune facture ajoutée</div>'; return; }
    invoices.forEach((inv, i) => {
      const item = document.createElement('div');
      item.className = 'invoice-item';
      item.innerHTML = `<span class="num">${inv.num}</span><span class="details">Échéance : ${formatDate(inv.date)}</span><span class="price">${formatPrice(inv.price)}</span><button class="btn-remove" onclick="removeInvoice(${i})">×</button>`;
      list.appendChild(item);
    });
  }

  function removeInvoice(i) { invoices.splice(i, 1); renderList(); }

  function toggleOpt(btn) {
    const key = btn.dataset.key;
    if (activeOpts.has(key)) { activeOpts.delete(key); btn.classList.remove('active'); }
    else { activeOpts.add(key); btn.classList.add('active'); }
  }

  function formatDate(d) { if (!d) return ''; const [y,m,day] = d.split('-'); return `${day}/${m}/${y}`; }
  function formatPrice(p) { return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', minimumFractionDigits: 2 }).format(p); }

  function buildSubject() {
    const company = document.getElementById('inp-company').value.trim();
    return `RETARD DE PAIEMENT PENELOPE${company ? ' - ' + company.toUpperCase() : ''}`;
  }

  function buildBody() {
    const isPhone = activeOpts.has('phone');
    const isSecond = activeOpts.has('reminder2');
    const isUrgent = activeOpts.has('urgent');
    const isJoint = activeOpts.has('joint');

    let intro = 'Bonjour,\n\n';
    if (isPhone) intro += "Faisant suite à notre échange téléphonique, je me permets de vous contacter concernant le règlement de la facture ci-dessous, dont l'échéance est désormais dépassée :";
    else if (isSecond) intro += "Sauf erreur de notre part, et malgré notre précédent rappel, nous n'avons toujours pas reçu le règlement de la facture ci-dessous :";
    else if (isUrgent) intro += "Je me permets de revenir vers vous en urgence concernant le règlement de la facture ci-dessous, dont l'échéance est largement dépassée :";
    else intro += "Je me permets de vous contacter concernant le règlement de la facture ci-dessous, dont l'échéance est désormais dépassée :";

    let factureBlock = '';
    if (invoices.length === 1) {
      const inv = invoices[0];
      factureBlock = `Facture n° ${inv.num}, échéance au ${formatDate(inv.date)}, montant ${formatPrice(inv.price)}.`;
    } else {
      factureBlock = invoices.map(inv => `• Facture n° ${inv.num}, échéance au ${formatDate(inv.date)}, montant ${formatPrice(inv.price)}.`).join('\n');
      factureBlock += `\n\nTotal dû : ${formatPrice(invoices.reduce((s,i) => s + i.price, 0))}`;
    }

    let pj = '';
    if (isJoint) pj = `\nVous trouverez ${invoices.length > 1 ? 'les factures concernées' : 'la facture concernée'} en pièce jointe de ce message.\n`;

    const closing = `\nSi le paiement a déjà été effectué, je vous remercie de bien vouloir nous transmettre l'avis de règlement en retour de mail.\n\nCordialement,\nLouiza Hadid\nService recouvrement du groupe\nPénélope\n0142001145`;

    return `${intro}\n${factureBlock}\n${pj}${closing}`;
  }

  function generate() {
    if (invoices.length === 0) { alert('Ajoutez au moins une facture.'); return; }
    const subject = buildSubject();
    const body = buildBody();
    const email = document.getElementById('inp-email').value.trim();

    document.getElementById('result-subject-text').textContent = subject;
    document.getElementById('mail-body').textContent = body;
    document.getElementById('result-card').classList.add('visible');

    const btn = document.getElementById('btn-outlook');
    const mailto = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    btn.href = mailto;
    if (!email) {
      btn.classList.add('disabled');
      document.getElementById('outlook-label').textContent = 'Ouvrir dans Outlook (mail manquant)';
    } else {
      btn.classList.remove('disabled');
      document.getElementById('outlook-label').textContent = 'Ouvrir dans Outlook';
    }

    document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
    document.getElementById('copy-label').textContent = 'Copier le mail';
  }

  function copyMail() {
    navigator.clipboard.writeText(document.getElementById('mail-body').textContent).then(() => {
      const label = document.getElementById('copy-label');
      label.textContent = '✓ Copié !';
      setTimeout(() => label.textContent = 'Copier le mail', 2500);
    });
  }

  function copySubject() {
    navigator.clipboard.writeText(document.getElementById('result-subject-text').textContent).then(() => {
      event.target.textContent = '✓';
      setTimeout(() => event.target.textContent = 'Copier', 2000);
    });
  }

  function reset() {
    invoices = [];
    activeOpts.clear();
    renderList();
    document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('inp-email').value = '';
    document.getElementById('inp-company').value = '';
    document.getElementById('result-card').classList.remove('visible');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
